    reason_code: confusion_signaling_readiness
    gating_posture: informing
    routing_rule: route_to_c1_when_fraction_structure_breakdown_cooccurs_with_silent_confusion_or_nonuse_of_clarification
    subject_failure_mode_targets: [F1-FM-03]
    learning_to_learn_failure_mode_targets: [C1-FM-01, C1-FM-03]
    claim_boundary: does_not_replace_fraction_structure_mastery_evidence
    review_status: draft
    source_path: domains/learning_to_learn/cross-domain-attachments/attachment-registry.yaml
