slice_id: learning-to-learn-independent-learning-upper-band
version: "0.1"
examples:
  - example_id: upper-band-a3-hold
    current_node_id: A3
    learner_state:
      status: blocked
      direct_accuracy: 0.52
      transfer_status: not_met
      retention_status: not_due
      dominant_failure_modes: [A3-FM-01]
    expected_decision: hold_current
    expected_outcome: remain_on_current_node_and_serve_bounded_support_asset

  - example_id: upper-band-r4-upstream
    current_node_id: R4
    learner_state:
      status: blocked
      dependency_status:
        R3: met
        S3: unmet
        M3: met
      direct_accuracy: 0.49
      transfer_status: not_met
      retention_status: not_due
      dominant_failure_modes: [R4-FM-02]
    expected_decision: route_upstream
    expected_outcome: return_to_unmet_learning_to_learn_dependency

  - example_id: upper-band-m4-reverify
    current_node_id: M4
    learner_state:
      status: provisional
      direct_accuracy: 0.86
      transfer_status: met
      retention_status: not_due
      dominant_failure_modes: []
    expected_decision: reverify
    expected_outcome: serve_delayed_recheck_before_further_advancement

  - example_id: upper-band-t2-accelerate
    current_node_id: T2
    learner_state:
      status: secure
      direct_accuracy: 0.89
      transfer_status: met
      retention_status: met
      dominant_failure_modes: []
    expected_decision: accelerate
    expected_outcome: allow_entry_into_more_distant_transfer_or_independent_orchestration_work
