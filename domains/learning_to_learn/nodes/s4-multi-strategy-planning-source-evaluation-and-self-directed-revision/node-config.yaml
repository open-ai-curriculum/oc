id: S4
name: multi_strategy_planning_source_evaluation_and_self_directed_revision
domain: learning_to_learn
support_tier: Incubation
maturity_state: Drafted
supported_profiles:
  - cross-domain-learning-support-node-package
evidence_class: Synthetic
dependencies: [S3, R4]
mastery:
  direct_accuracy_threshold: 0.85
  explanation_required: true
  transfer_required: true
  retention_check_days: 28
statuses: [blocked, emerging, provisional, secure, unstable]
verification_gates:
  - id: G1
    type: direct_performance
    pass_rule: compares strategies and revises the approach using evaluated sources in at least 4 of 5 opportunities
  - id: G2
    type: transfer
    pass_rule: self-directed revision holds across at least two subject or task contexts
  - id: G3
    type: retention
    pass_rule: stable recheck performance after approximately 28 days
failure_modes: [S4-FM-01, S4-FM-02, S4-FM-03]
artifact_files:
  - node-spec.md
  - verification-model.md
  - failure-taxonomy.md
  - intervention-playbook.md
  - intervention-map.json
  - learner-state-model.md
  - learner-state.schema.json
  - example-learner-states.json
  - transition-rules.yaml
  - teacher-observability.md
  - agent-behavior.md
