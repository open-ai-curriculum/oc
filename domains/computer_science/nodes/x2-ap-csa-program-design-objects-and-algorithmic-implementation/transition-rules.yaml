node_id: X2
version: 0.1
transitions:
  - from: blocked
    to: emerging
    when:
      - direct_accuracy_improves_meaningfully
      - dependencies_p6_and_a3_and_c4_are_not_both_blocked
  - from: emerging
    to: provisional
    when:
      - dependencies_p6_and_a3_and_c4_are_secure
      - direct_gate_passes
      - meaning_gate_passes
      - transfer_gate_passes
      - retention_not_yet_due
  - from: provisional
    to: secure
    when:
      - retention_gate_passes
  - from: secure
    to: unstable
    when:
      - delayed_recheck_fails
      - dependency_p6_or_a3_or_c4_becomes_unstable
