node_id: G4
version: 0.1
transitions:
  - from: blocked
    to: emerging
    when:
      - direct_accuracy_improves_meaningfully
      - dependencies_t6_and_m5_and_e4_are_not_both_blocked
  - from: emerging
    to: provisional
    when:
      - dependencies_t6_and_m5_and_e4_are_secure
      - direct_gate_passes
      - meaning_gate_passes
      - transfer_gate_passes
      - retention_not_yet_due
  - from: provisional
    to: secure
    when:
      - retention_gate_passes
  - from: secure
    to: unstable
    when:
      - delayed_recheck_fails
      - dependency_t6_or_m5_or_e4_becomes_unstable
