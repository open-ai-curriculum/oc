node_id: B6
version: 0.1
transitions:
  - from: blocked
    to: emerging
    when:
      - direct_accuracy_improves_meaningfully
      - dependencies_b4_and_b5_and_t6_are_not_both_blocked
  - from: emerging
    to: provisional
    when:
      - dependencies_b4_and_b5_and_t6_are_secure
      - direct_gate_passes
      - meaning_gate_passes
      - transfer_gate_passes
      - retention_not_yet_due
  - from: provisional
    to: secure
    when:
      - retention_gate_passes
  - from: secure
    to: unstable
    when:
      - delayed_recheck_fails
      - dependency_b4_or_b5_or_t6_becomes_unstable
