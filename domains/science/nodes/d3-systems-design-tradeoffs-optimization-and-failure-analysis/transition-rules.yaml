node_id: D3
version: 0.1
transitions:
  - from: blocked
    to: emerging
    when:
      - direct_accuracy_improves_meaningfully
      - dependencies_d2_e3_and_m3_are_not_all_blocked
  - from: emerging
    to: provisional
    when:
      - dependencies_d2_e3_and_m3_are_secure
      - direct_gate_passes
      - meaning_gate_passes
      - transfer_gate_passes
      - retention_not_yet_due
  - from: provisional
    to: secure
    when:
      - retention_gate_passes
  - from: secure
    to: unstable
    when:
      - delayed_recheck_fails
      - dependency_d2_e3_or_m3_becomes_unstable
