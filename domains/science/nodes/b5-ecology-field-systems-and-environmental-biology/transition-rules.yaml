node_id: B5
version: 0.1
transitions:
  - from: blocked
    to: emerging
    when:
      - direct_accuracy_improves_meaningfully
      - dependencies_l4_and_l6_and_t5_and_i4_are_not_both_blocked
  - from: emerging
    to: provisional
    when:
      - dependencies_l4_and_l6_and_t5_and_i4_are_secure
      - direct_gate_passes
      - meaning_gate_passes
      - transfer_gate_passes
      - retention_not_yet_due
  - from: provisional
    to: secure
    when:
      - retention_gate_passes
  - from: secure
    to: unstable
    when:
      - delayed_recheck_fails
      - dependency_l4_or_l6_or_t5_or_i4_becomes_unstable
