domain: social_studies
version: 0.1

graph:
  id: ap_microeconomics_exploratory_focused_graph
  purpose: bounded economics-facing exploratory graph cut for the weakest current AP microeconomics support surface
  assessment_family: AP Microeconomics
  assurance_posture: exploratory_course_specificity

families:
  - id: E
    name: economics_and_exchange_systems
    nodes:
      - id: E1
        name: needs_wants_choice_and_exchange
        depends_on: [Q1]
      - id: E2
        name: production_consumption_and_local_markets
        depends_on: [E1, Q2]
      - id: E3
        name: incentives_trade_and_simple_systems
        depends_on: [E2, Q3]
      - id: E4
        name: markets_labor_and_public_resource_decisions
        depends_on: [E3, C2, Q4]
      - id: E5
        name: macroeconomic_patterns_global_trade_and_finance_basics
        depends_on: [E4, G4, Q5]
      - id: E6
        name: economic_analysis_policy_tradeoffs_and_capstone_modeling
        depends_on: [E5, C4, Q6]

  - id: Q
    name: inquiry_evidence_and_discourse
    nodes:
      - id: Q3
        name: supported_explanation_from_evidence
        depends_on: [Q2]
      - id: Q4
        name: investigation_design_representation_and_data_use
        depends_on: [Q3]
      - id: Q5
        name: evaluation_of_sources_models_and_claims
        depends_on: [Q4]
      - id: Q6
        name: synthesis_argument_and_public_communication
        depends_on: [Q5]

  - id: C
    name: civics_and_collective_decision_making
    nodes:
      - id: C4
        name: constitutional_principles_and_public_policy
        depends_on: [C3, H3, Q4]
      - id: C6
        name: advanced_civic_argument_policy_design_and_participation
        depends_on: [C5, E5, Q6]

  - id: A
    name: advanced_secondary_synthesis_and_public_argument
    nodes:
      - id: A1
        name: interdisciplinary_research_and_evidence_synthesis
        depends_on: [H5, C5, G5, E5, Q6]

out_of_scope:
  - firm_structure_as_first_class_nodes
  - welfare_analysis_as_first_class_nodes
  - elasticity_and_cost_curve_course_models
