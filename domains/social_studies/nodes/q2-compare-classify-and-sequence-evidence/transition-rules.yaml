node_id: Q2
version: 0.1
transitions:
  - from: blocked
    to: emerging
    when:
      - q1_dependency_not_blocking
      - direct_accuracy_improves_meaningfully
  - from: emerging
    to: provisional
    when:
      - q1_dependency_secure_or_provisional
      - direct_gate_passes
      - meaning_gate_passes
      - transfer_gate_passes
      - retention_not_yet_due
  - from: provisional
    to: secure
    when:
      - retention_gate_passes
  - from: secure
    to: unstable
    when:
      - delayed_recheck_fails
      - or_dependency_q1_becomes_unstable
