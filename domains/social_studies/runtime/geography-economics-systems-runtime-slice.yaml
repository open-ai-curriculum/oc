slice_id: social_studies_geography_economics_systems_runtime
domain: social_studies
status: draft
version: 0.1
node_ids:
  - G3
  - G4
  - E3
  - E4
entry_node_ids:
  - G3
learner_state_fields:
  - learner_id
  - node_id
  - status
  - dependency_status
  - direct_accuracy
  - explanation_status
  - transfer_status
  - retention_status
  - dominant_failure_modes
  - recommended_interventions
  - last_verified_at
  - review_state
artifact_registry_reference: domains/social_studies/artifact-attachments/geography-economics-systems-attachment-registry.yaml
navigation_rules:
  - rule_id: ss-geoecon-teach-next
    decision_type: teach_next
    applies_when:
      - current_node_status in [secure]
      - next_node_dependencies_secure
      - next_node_not_yet_secure
    outcome: advance_to_next_available_geography_or_economics_systems_node
    artifact_selection: prefer InquiryTask or GuidedPractice on target node
  - rule_id: ss-geoecon-hold-current
    decision_type: hold_current
    applies_when:
      - current_node_status in [blocked, emerging, provisional]
      - current_node_is_instructionally_actionable
    outcome: remain_on_current_systems_node
    artifact_selection: prefer SimulationTask or GuidedPractice on current node
  - rule_id: ss-geoecon-route-upstream
    decision_type: route_upstream
    applies_when:
      - current_node_status = blocked
      - dependency_status_contains_unstable_or_blocked
    outcome: route_to_most_relevant_upstream_dependency
    artifact_selection: prefer intervention or reteach artifact on unstable dependency node
  - rule_id: ss-geoecon-reverify
    decision_type: reverify
    applies_when:
      - current_node_status = provisional
      - retention_due_or_required_before_advancement
    outcome: schedule_retention_or_transfer_recheck
    artifact_selection: prefer verification or short application task on current node
review_status: draft
