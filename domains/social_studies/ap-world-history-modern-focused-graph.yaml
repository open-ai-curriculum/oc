domain: social_studies
version: 0.1

graph:
  id: ap_world_history_modern_focused_graph
  purpose: bounded world-history-facing graph cut for the current AP World History Modern support surface
  assessment_family: "AP World History: Modern"
  assurance_posture: substantial_but_compressed_course_specificity

families:
  - id: H
    name: history_and_source_reasoning
    nodes:
      - id: H2
        name: historical_sources_and_past_present_comparison
        depends_on: [H1, Q2]
      - id: H3
        name: causation_context_and_change_over_time
        depends_on: [H2, Q3]
      - id: H4
        name: sourcing_corroboration_and_historical_argument
        depends_on: [H3, Q4]
      - id: H5
        name: thematic_historical_analysis_and_periodization
        depends_on: [H4, Q5]
      - id: H6
        name: historiography_public_history_and_capstone_argument
        depends_on: [H5, Q6]

  - id: Q
    name: inquiry_evidence_and_discourse
    nodes:
      - id: Q4
        name: investigation_design_representation_and_data_use
        depends_on: [Q3]
      - id: Q5
        name: evaluation_of_sources_models_and_claims
        depends_on: [Q4]
      - id: Q6
        name: synthesis_argument_and_public_communication
        depends_on: [Q5]

  - id: C
    name: civics_and_collective_decision_making
    nodes:
      - id: C4
        name: constitutional_principles_and_public_policy
        depends_on: [C3, H3, Q4]
      - id: C5
        name: comparative_government_and_civic_action
        depends_on: [C4, G4, Q5]

  - id: G
    name: geography_and_human_environment_systems
    nodes:
      - id: G2
        name: human_environment_interaction_and_regions
        depends_on: [G1, Q2]
      - id: G3
        name: spatial_patterns_movement_and_resources
        depends_on: [G2, Q3]
      - id: G4
        name: geographic_reasoning_with_maps_data_and_scale
        depends_on: [G3, Q4]
      - id: G5
        name: global_interdependence_migration_and_sustainability
        depends_on: [G4, Q5]
      - id: G6
        name: geospatial_analysis_and_policy_application
        depends_on: [G5, C4, Q6]

  - id: E
    name: economics_and_exchange_systems
    nodes:
      - id: E3
        name: incentives_trade_and_simple_systems
        depends_on: [E2, Q3]
      - id: E4
        name: markets_labor_and_public_resource_decisions
        depends_on: [E3, C2, Q4]
      - id: E5
        name: macroeconomic_patterns_global_trade_and_finance_basics
        depends_on: [E4, G4, Q5]

  - id: A
    name: advanced_secondary_synthesis_and_public_argument
    nodes:
      - id: A1
        name: interdisciplinary_research_and_evidence_synthesis
        depends_on: [H5, C5, G5, E5, Q6]
      - id: A2
        name: capstone_argument_modeling_and_public_communication
        depends_on: [A1, H6, C6, G6, E6]

out_of_scope:
  - fine_grained_world_history_regional_subgraphs
  - first_class_period_specific_course_units
