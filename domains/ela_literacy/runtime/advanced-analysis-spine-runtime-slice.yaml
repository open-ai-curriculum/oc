slice_id: ela-literacy-advanced-analysis-spine-runtime
domain: ela_literacy
status: draft
version: '0.1'
node_ids:
- R4
- R5
- R6
- WC7
- WC8
- AC1
- AC2
- AC3
- AC4
- AC5
entry_node_ids:
- R6
- WC7
- AC1
learner_state_fields:
- learner_id
- node_id
- status
- dependency_status
- direct_accuracy
- explanation_status
- transfer_status
- retention_status
- dominant_failure_modes
- recommended_interventions
- last_verified_at
- review_state
artifact_registry_reference: domains/ela_literacy/artifact-attachments/advanced-analysis-spine-attachment-registry.yaml
navigation_rules:
- rule_id: advanced-analysis-teach-next
  decision_type: teach_next
  applies_when:
  - current_node_status in [secure]
  - next_node_dependencies_secure
  - next_node_not_yet_secure
  outcome: advance_to_next_available_advanced_analysis_node
  artifact_selection: prefer LessonPattern, WorkedExample, or GuidedPracticeSet on
    target node
- rule_id: advanced-analysis-hold-current
  decision_type: hold_current
  applies_when:
  - current_node_status in [blocked, emerging, provisional]
  - current_node_is_instructionally_actionable
  outcome: remain_on_current_advanced_node
  artifact_selection: prefer VerificationTask or GuidedPracticeSet on current node
- rule_id: advanced-analysis-route-upstream
  decision_type: route_upstream
  applies_when:
  - current_node_status = blocked
  - dependency_status_contains_unstable_or_blocked
  outcome: route_to_most_relevant_upstream_dependency_or_bridge_node
  artifact_selection: prefer InterventionAsset or ReteachRoutine on unstable dependency
    node
- rule_id: advanced-analysis-reverify
  decision_type: reverify
  applies_when:
  - current_node_status = provisional
  - retention_due_or_required_before_capstone_advancement
  outcome: schedule_retention_or_transfer_recheck
  artifact_selection: prefer RetentionCheck or VerificationTask on current node
review_status: draft
