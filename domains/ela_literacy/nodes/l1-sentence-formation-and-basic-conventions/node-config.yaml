id: L1
name: sentence_formation_and_basic_conventions
domain: ela_literacy
support_tier: Core release
maturity_state: Drafted
supported_profiles:
  - early-language-node-package
evidence_class: Synthetic
dependencies:
  - O3
  - P4
mastery:
  direct_accuracy_threshold: 0.85
  explanation_required: true
  transfer_required: true
  retention_check_days: 14
statuses:
  - blocked
  - emerging
  - provisional
  - secure
  - unstable
verification_gates:
  - id: G1
    type: direct_performance
    pass_rule: produces complete simple sentences with basic conventions or oral-to-written transfer in at least 5 of 6 supported opportunities
  - id: G2
    type: meaning
    pass_rule: sentence meaning remains recoverable and convention use is sufficient for intended interpretation in at least 4 of 5 prompts
  - id: G3
    type: transfer
    pass_rule: succeeds across at least one changed topic, prompt, or production format
  - id: G4
    type: retention
    pass_rule: stable delayed recheck after approximately 14 days
failure_modes:
  - L1-FM-01
  - L1-FM-02
  - L1-FM-03
  - L1-FM-04
