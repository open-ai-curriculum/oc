id: RC1
name: literal_comprehension_of_shared_text
domain: ela_literacy
support_tier: Core release
maturity_state: Drafted
supported_profiles:
  - early-comprehension-node-package
evidence_class: Synthetic
dependencies:
  - O3
  - P1
mastery:
  direct_accuracy_threshold: 0.85
  explanation_required: true
  transfer_required: true
  retention_check_days: 14
statuses:
  - blocked
  - emerging
  - provisional
  - secure
  - unstable
verification_gates:
  - id: G1
    type: direct_performance
    pass_rule: answers literal questions or demonstrates literal understanding from shared or read-aloud text in at least 5 of 6 supported opportunities
  - id: G2
    type: meaning
    pass_rule: recounts or identifies key details from text in at least 4 of 5 prompts with text-relevant accuracy
  - id: G3
    type: transfer
    pass_rule: succeeds across at least one changed text, genre, or oral response format
  - id: G4
    type: retention
    pass_rule: stable delayed recheck after approximately 14 days
failure_modes:
  - RC1-FM-01
  - RC1-FM-02
  - RC1-FM-03
  - RC1-FM-04
