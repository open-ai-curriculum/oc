id: FR3
name: simple_pattern_decoding_and_encoding
domain: ela_literacy
support_tier: Core release
maturity_state: Drafted
supported_profiles:
  - foundational-reading-node-package
evidence_class: Synthetic
dependencies:
  - FR2
mastery:
  direct_accuracy_threshold: 0.85
  explanation_required: true
  transfer_required: true
  retention_check_days: 14
statuses:
  - blocked
  - emerging
  - provisional
  - secure
  - unstable
verification_gates:
  - id: G1
    type: direct_performance
    pass_rule: decodes and encodes supported simple-word patterns accurately in at least 5 of 6 structured opportunities
  - id: G2
    type: meaning
    pass_rule: explains or demonstrates sound-symbol reasoning during at least 4 of 5 prompted trials
  - id: G3
    type: transfer
    pass_rule: succeeds on at least one changed simple-pattern set rather than one memorized list only
  - id: G4
    type: retention
    pass_rule: stable delayed recheck after approximately 14 days
failure_modes:
  - FR3-FM-01
  - FR3-FM-02
  - FR3-FM-03
  - FR3-FM-04
