id: P1
name: book_handling_print_awareness_and_directionality
domain: ela_literacy
support_tier: Core release
maturity_state: Drafted
supported_profiles:
  - upstream-readiness-node-package
evidence_class: Synthetic
dependencies:
  - O1
mastery:
  direct_accuracy_threshold: 0.85
  explanation_required: false
  transfer_required: true
  retention_check_days: 14
statuses:
  - blocked
  - emerging
  - provisional
  - secure
  - unstable
verification_gates:
  - id: G1
    type: direct_performance
    pass_rule: handles books and pages purposefully in at least 5 of 6 structured opportunities
  - id: G2
    type: meaning
    pass_rule: distinguishes print from pictures and demonstrates basic left-to-right or top-to-bottom tracking expectations where appropriate in at least 4 of 5 prompts
  - id: G3
    type: transfer
    pass_rule: succeeds across at least one changed book, layout, or print format
  - id: G4
    type: retention
    pass_rule: stable delayed recheck after approximately 14 days
failure_modes:
  - P1-FM-01
  - P1-FM-02
  - P1-FM-03
