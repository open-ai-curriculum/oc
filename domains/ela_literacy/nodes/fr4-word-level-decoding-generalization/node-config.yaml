id: FR4
name: word_level_decoding_generalization
domain: ela_literacy
support_tier: Core release
maturity_state: Drafted
supported_profiles:
  - foundational-reading-node-package
evidence_class: Synthetic
dependencies:
  - FR3
mastery:
  direct_accuracy_threshold: 0.85
  explanation_required: true
  transfer_required: true
  retention_check_days: 14
statuses:
  - blocked
  - emerging
  - provisional
  - secure
  - unstable
verification_gates:
  - id: G1
    type: direct_performance
    pass_rule: decodes and encodes changed simple-word sets accurately in at least 5 of 6 structured opportunities
  - id: G2
    type: meaning
    pass_rule: reveals sound-symbol and pattern reasoning in at least 4 of 5 prompted trials
  - id: G3
    type: transfer
    pass_rule: succeeds across at least two changed sets or task surfaces rather than a single practiced set
  - id: G4
    type: retention
    pass_rule: stable delayed recheck after approximately 14 days
failure_modes:
  - FR4-FM-01
  - FR4-FM-02
  - FR4-FM-03
  - FR4-FM-04
