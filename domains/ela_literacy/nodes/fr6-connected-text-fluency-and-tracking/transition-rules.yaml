node_id: FR6
version: 0.1
transitions:
  - from: blocked
    to: emerging
    when:
      - direct_accuracy_improves_meaningfully
      - dependency_FR5_not_blocked
      - dependency_P2_not_blocked
  - from: emerging
    to: provisional
    when:
      - direct_gate_passes
      - transfer_gate_passes
      - fluency_improves_meaningfully
      - retention_not_yet_due
  - from: provisional
    to: secure
    when:
      - retention_gate_passes
  - from: secure
    to: unstable
    when:
      - delayed_recheck_fails
      - connected_text_control_regresses
