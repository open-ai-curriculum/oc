id: W5
name: research_synthesis_and_citation_control
domain: ela_literacy
support_tier: Core release
maturity_state: Superseded
supported_profiles:
- legacy-writing-or-analysis-node-package
evidence_class: Synthetic
dependencies:
- W4
- R6
- L3
mastery:
  direct_accuracy_threshold: 0.85
  explanation_required: true
  transfer_required: true
  retention_check_days: 21
statuses:
- blocked
- emerging
- provisional
- secure
- unstable
verification_gates:
- id: G1
  type: direct_performance
  pass_rule: synthesizes multiple sources into a coherent research-based response
    in at least 5 of 6 supported opportunities
- id: G2
  type: meaning
  pass_rule: source integration, attribution, and citation control remain interpretable
    and relevant in at least 4 of 5 prompts
- id: G3
  type: transfer
  pass_rule: succeeds across at least one changed source set, research question, or
    citation format surface
- id: G4
  type: retention
  pass_rule: stable delayed recheck after approximately 21 days
failure_modes:
- W5-FM-01
- W5-FM-02
- W5-FM-03
- W5-FM-04
