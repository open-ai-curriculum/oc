id: P4
name: alphabet_knowledge_and_letter_formation
domain: ela_literacy
support_tier: Core release
maturity_state: Drafted
supported_profiles:
  - literacy-entry-node-package
evidence_class: Synthetic
dependencies:
  - P1
  - P3
mastery:
  direct_accuracy_threshold: 0.85
  explanation_required: false
  transfer_required: true
  retention_check_days: 14
statuses:
  - blocked
  - emerging
  - provisional
  - secure
  - unstable
verification_gates:
  - id: G1
    type: direct_performance
    pass_rule: identifies and forms a supported set of letters accurately in at least 5 of 6 opportunities
  - id: G2
    type: meaning
    pass_rule: distinguishes letters from non-letter symbols and demonstrates usable letter-name or letter-form knowledge in at least 4 of 5 prompts
  - id: G3
    type: transfer
    pass_rule: succeeds across at least one changed modality, letter set, or production format
  - id: G4
    type: retention
    pass_rule: stable delayed recheck after approximately 14 days
failure_modes:
  - P4-FM-01
  - P4-FM-02
  - P4-FM-03
  - P4-FM-04
