  - emerging
  - provisional
  - secure
  - unstable
verification_gates:
  - id: G1
    type: direct_performance
    pass_rule: decodes and encodes simple supported words accurately in at least 5 of 6 structured opportunities
  - id: G2
    type: meaning
    pass_rule: demonstrates that sound-symbol mapping is being applied to whole-word reading or spelling rather than guessed form recognition in at least 4 of 5 prompts
  - id: G3
    type: transfer
    pass_rule: succeeds across at least one changed word set, modality, or simple connected-word task
  - id: G4
    type: retention
    pass_rule: stable delayed recheck after approximately 14 days
failure_modes:
  - F2-FM-01
  - F2-FM-02
  - F2-FM-03
  - F2-FM-04
