id: A1
name: rhetorical_analysis_and_synthesis
domain: ela_literacy
support_tier: Core release
maturity_state: Superseded
supported_profiles:
- legacy-writing-or-analysis-node-package
evidence_class: Synthetic
dependencies:
- W5
- R6
- L3
mastery:
  direct_accuracy_threshold: 0.85
  explanation_required: true
  transfer_required: true
  retention_check_days: 21
statuses:
- blocked
- emerging
- provisional
- secure
- unstable
verification_gates:
- id: G1
  type: direct_performance
  pass_rule: analyzes rhetoric and synthesizes across complex sources in at least
    5 of 6 supported opportunities
- id: G2
  type: meaning
  pass_rule: explanation of rhetorical strategy, synthesis, and claim relationships
    remains coherent and source-grounded in at least 4 of 5 prompts
- id: G3
  type: transfer
  pass_rule: succeeds across at least one changed source set, rhetorical situation,
    or synthesis task
- id: G4
  type: retention
  pass_rule: stable delayed recheck after approximately 21 days
failure_modes:
- A1-FM-01
- A1-FM-02
- A1-FM-03
- A1-FM-04
