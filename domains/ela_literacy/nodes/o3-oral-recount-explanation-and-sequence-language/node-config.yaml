id: O3
name: oral_recount_explanation_and_sequence_language
domain: ela_literacy
support_tier: Core release
maturity_state: Drafted
supported_profiles:
  - literacy-entry-node-package
evidence_class: Synthetic
dependencies:
  - O2
mastery:
  direct_accuracy_threshold: 0.85
  explanation_required: true
  transfer_required: true
  retention_check_days: 14
statuses:
  - blocked
  - emerging
  - provisional
  - secure
  - unstable
verification_gates:
  - id: G1
    type: direct_performance
    pass_rule: recounts or sequences events with correct order and enough relevant detail in at least 5 of 6 supported prompts
  - id: G2
    type: meaning
    pass_rule: explains what happened or why in at least 4 of 5 oral prompts with relevant response content
  - id: G3
    type: transfer
    pass_rule: succeeds across at least one changed topic, prompt structure, or oral interaction format
  - id: G4
    type: retention
    pass_rule: stable delayed recheck after approximately 14 days
failure_modes:
  - O3-FM-01
  - O3-FM-02
  - O3-FM-03
  - O3-FM-04
