    type: meaning
    pass_rule: communicates a relevant idea, event, or referent through the produced representation in at least 4 of 5 prompts
  - id: G3
    type: transfer
    pass_rule: succeeds across at least one changed topic, prompt, or production format
  - id: G4
    type: retention
    pass_rule: stable delayed recheck after approximately 14 days
failure_modes:
