id: RC2
name: inferential_and_integrative_comprehension_of_shared_text
domain: ela_literacy
support_tier: Core release
maturity_state: Drafted
supported_profiles:
  - early-comprehension-node-package
evidence_class: Synthetic
dependencies:
  - RC1
mastery:
  direct_accuracy_threshold: 0.85
  explanation_required: true
  transfer_required: true
  retention_check_days: 14
statuses:
  - blocked
  - emerging
  - provisional
  - secure
  - unstable
verification_gates:
  - id: G1
    type: direct_performance
    pass_rule: answers bounded inferential or integrative prompts from shared text in at least 5 of 6 supported opportunities
  - id: G2
    type: meaning
    pass_rule: explains how two or more details support the response in at least 4 of 5 prompts
  - id: G3
    type: transfer
    pass_rule: succeeds across at least one changed shared text, genre, or prompt format
  - id: G4
    type: retention
    pass_rule: stable delayed recheck after approximately 14 days
failure_modes:
  - RC2-FM-01
  - RC2-FM-02
  - RC2-FM-03
  - RC2-FM-04
