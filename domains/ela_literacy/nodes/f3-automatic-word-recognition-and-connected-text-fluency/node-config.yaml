verification_gates:
  - id: G1
    type: direct_performance
    pass_rule: reads supported connected text with usable accuracy and pacing in at least 5 of 6 opportunities
  - id: G2
    type: meaning
    pass_rule: demonstrates that word recognition is supporting meaning rather than disconnected word calling in at least 4 of 5 prompts
  - id: G3
    type: transfer
    pass_rule: succeeds across at least one changed text, layout, or decodable passage set
  - id: G4
    type: retention
    pass_rule: stable delayed recheck after approximately 14 days
failure_modes:
  - F3-FM-01
  - F3-FM-02
  - F3-FM-03
  - F3-FM-04
