node_id: RC3
version: '0.1'
transitions:
- from: blocked
  to: emerging
  when:
  - direct_accuracy_improves_meaningfully
  - dependency_FR4_not_blocked
  - dependency_RC1_not_blocked
- from: emerging
  to: provisional
  when:
  - direct_gate_passes
  - meaning_gate_passes
  - transfer_gate_passes
  - retention_not_yet_due
- from: provisional
  to: secure
  when:
  - retention_gate_passes
- from: secure
  to: unstable
  when:
  - delayed_recheck_fails
  - rc3_performance_regresses
