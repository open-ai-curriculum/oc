  - RC1
mastery:
  direct_accuracy_threshold: 0.85
  explanation_required: true
  transfer_required: true
  retention_check_days: 14
statuses:
  - blocked
  - emerging
  - provisional
  - secure
  - unstable
verification_gates:
  - id: G1
    type: direct_performance
    pass_rule: answers sentence-level meaning prompts accurately in at least 5 of 6 supported opportunities
  - id: G2
    type: meaning
    pass_rule: paraphrases or otherwise demonstrates sentence meaning in at least 4 of 5 prompts
  - id: G3
    type: transfer
    pass_rule: succeeds across at least one changed sentence frame, syntax pattern, or support surface
  - id: G4
    type: retention
    pass_rule: stable delayed recheck after approximately 14 days
failure_modes:
  - RC3-FM-01
  - RC3-FM-02
  - RC3-FM-03
  - RC3-FM-04
