node_id: FR1
version: 0.1
transitions:
  - from: blocked
    to: emerging
    when:
      - direct_accuracy_improves_meaningfully
      - dependency_P3_not_blocked
      - dependency_P4_not_blocked
  - from: emerging
    to: provisional
    when:
      - direct_gate_passes
      - transfer_gate_passes
      - retention_not_yet_due
  - from: provisional
    to: secure
    when:
      - retention_gate_passes
  - from: secure
    to: unstable
    when:
      - delayed_recheck_fails
      - direct_mapping_regresses
