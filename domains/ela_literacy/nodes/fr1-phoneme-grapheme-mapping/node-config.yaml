id: FR1
name: phoneme_grapheme_mapping
domain: ela_literacy
support_tier: Core release
maturity_state: Drafted
supported_profiles:
  - foundational-reading-node-package
evidence_class: Synthetic
dependencies:
  - P3
  - P4
mastery:
  direct_accuracy_threshold: 0.85
  explanation_required: false
  transfer_required: true
  retention_check_days: 14
statuses:
  - blocked
  - emerging
  - provisional
  - secure
  - unstable
verification_gates:
  - id: G1
    type: direct_performance
    pass_rule: matches supported phonemes and graphemes accurately in at least 5 of 6 structured opportunities
  - id: G2
    type: transfer
    pass_rule: succeeds across at least one changed symbol or sound set without cue collapse
  - id: G3
    type: retention
    pass_rule: stable delayed recheck after approximately 14 days
failure_modes:
  - FR1-FM-01
  - FR1-FM-02
  - FR1-FM-03
  - FR1-FM-04
