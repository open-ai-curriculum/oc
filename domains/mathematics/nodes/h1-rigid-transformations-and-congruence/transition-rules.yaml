node: H1
transitions:
  - from: not_started
    to: in_progress
    when: first evidence is recorded
  - from: in_progress
    to: blocked
    when: a dominant failure mode persists across verification attempts
  - from: in_progress
    to: secure
    when:
      - direct_accuracy >= 0.86
      - explanation_status == meets
      - transfer_status == meets
      - retention_status == meets
  - from: blocked
    to: in_progress
    when: targeted intervention cycle is completed
