id: G1
name: shape_recognition_and_classification
domain: mathematics
support_tier: Core release
maturity_state: Drafted
supported_profiles:
- upstream-readiness-node-package
evidence_class: Synthetic
dependencies:
- Z2
mastery:
  direct_accuracy_threshold: 0.9
  explanation_required: true
  transfer_required: true
  retention_check_days: 14
statuses:
- blocked
- emerging
- provisional
- secure
- unstable
verification_gates:
- id: G1
  type: direct_performance
  pass_rule: '>= 0.90 accuracy across shape identification and classification tasks'
- id: G2
  type: meaning
  pass_rule: correct explanation of a shape attribute or class rule in at least 2
    of 3 prompts
- id: G3
  type: transfer
  pass_rule: successful identification in at least one changed orientation or unfamiliar
    context
- id: G4
  type: retention
  pass_rule: '>= 0.85 delayed recheck accuracy after ~14 days'
failure_modes:
- G1-FM-01
- G1-FM-02
- G1-FM-03
- G1-FM-04
