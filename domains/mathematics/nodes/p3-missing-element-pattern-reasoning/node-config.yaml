id: P3
name: missing_element_pattern_reasoning
domain: mathematics
support_tier: Core release
maturity_state: Drafted
supported_profiles:
- upstream-readiness-node-package
evidence_class: Synthetic
dependencies:
- P2
mastery:
  direct_accuracy_threshold: 0.9
  explanation_required: true
  transfer_required: true
  retention_check_days: 14
statuses:
- blocked
- emerging
- provisional
- secure
- unstable
verification_gates:
- id: G1
  type: direct_performance
  pass_rule: '>= 0.90 accuracy across missing-element pattern tasks'
- id: G2
  type: meaning
  pass_rule: correct explanation of why the missing element fits in at least 2 of
    3 prompts
- id: G3
  type: transfer
  pass_rule: successful missing-element reasoning in at least one changed pattern
    type or position
- id: G4
  type: retention
  pass_rule: '>= 0.85 delayed recheck accuracy after ~14 days'
failure_modes:
- P3-FM-01
- P3-FM-02
- P3-FM-03
- P3-FM-04
