id: U2
name: repeated_unit_reasoning
domain: mathematics
support_tier: Core release
maturity_state: Drafted
supported_profiles:
- upstream-readiness-node-package
evidence_class: Synthetic
dependencies:
- U1
mastery:
  direct_accuracy_threshold: 0.9
  explanation_required: true
  transfer_required: true
  retention_check_days: 14
statuses:
- blocked
- emerging
- provisional
- secure
- unstable
verification_gates:
- id: G1
  type: direct_performance
  pass_rule: '>= 0.90 accuracy across repeated-group and repeated-unit tasks'
- id: G2
  type: meaning
  pass_rule: correct explanation that the same group or unit is repeated in at least
    2 of 3 prompts
- id: G3
  type: transfer
  pass_rule: successful repeated-unit reasoning in at least one changed context
- id: G4
  type: retention
  pass_rule: '>= 0.85 delayed recheck accuracy after ~14 days'
failure_modes:
- U2-FM-01
- U2-FM-02
- U2-FM-03
- U2-FM-04
