id: Z3
name: pattern_and_sequence_readiness
domain: mathematics
support_tier: Core release
maturity_state: Drafted
supported_profiles:
- upstream-readiness-node-package
evidence_class: Synthetic
dependencies:
- Z2
mastery:
  direct_accuracy_threshold: 0.9
  explanation_required: true
  transfer_required: true
  retention_check_days: 14
statuses:
- blocked
- emerging
- provisional
- secure
- unstable
verification_gates:
- id: G1
  type: direct_performance
  pass_rule: '>= 0.90 accuracy across repeating-pattern and ordered-sequence tasks'
- id: G2
  type: meaning
  pass_rule: correct explanation of what repeats or what comes next in at least 2
    of 3 prompts
- id: G3
  type: transfer
  pass_rule: successful pattern or sequence reasoning in at least one changed material
    or picture format
- id: G4
  type: retention
  pass_rule: '>= 0.85 delayed recheck accuracy after ~14 days'
failure_modes:
- Z3-FM-01
- Z3-FM-02
- Z3-FM-03
- Z3-FM-04
