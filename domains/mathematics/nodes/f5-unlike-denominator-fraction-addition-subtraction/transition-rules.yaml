node_id: F5
version: 0.1
transitions:
  - from: blocked
    to: emerging
    when:
      - direct_accuracy_improves_meaningfully
      - at_least_one_blocking_failure_mode_weakens
  - from: emerging
    to: provisional
    when:
      - direct_gate_passes
      - meaning_gate_passes
      - transfer_gate_passes
      - retention_not_yet_due
  - from: provisional
    to: secure
    when:
      - retention_gate_passes
      - no_dependency_is_blocking
  - from: secure
    to: unstable
    when:
      - delayed_recheck_fails
      - upstream_dependency_becomes_blocking
      - repeated_failure_mode_reappears_at_significant_intensity
  - from: unstable
    to: secure
    when:
      - instability_is_corrected
      - reverification_confirms_restored_performance
