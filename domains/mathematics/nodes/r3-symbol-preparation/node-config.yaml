id: R3
name: symbol_preparation
domain: mathematics
support_tier: Core release
maturity_state: Drafted
supported_profiles:
- upstream-readiness-node-package
evidence_class: Synthetic
dependencies:
- R2
mastery:
  direct_accuracy_threshold: 0.9
  explanation_required: true
  transfer_required: true
  retention_check_days: 14
statuses:
- blocked
- emerging
- provisional
- secure
- unstable
verification_gates:
- id: G1
  type: direct_performance
  pass_rule: '>= 0.90 accuracy across spoken, written, and visual fraction-symbol
    preparation tasks'
- id: G2
  type: meaning
  pass_rule: correct explanation of what top and bottom positions are preparing to
    represent in at least 2 of 3 prompts
- id: G3
  type: transfer
  pass_rule: successful mapping in at least one changed surface form or context
- id: G4
  type: retention
  pass_rule: '>= 0.85 delayed recheck accuracy after ~14 days'
failure_modes:
- R3-FM-01
- R3-FM-02
- R3-FM-03
- R3-FM-04
