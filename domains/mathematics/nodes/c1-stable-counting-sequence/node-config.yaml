- id: G3
  type: transfer
  pass_rule: successful count-sequence use in at least one changed context such as
    start-stop or missing-number tasks
- id: G4
  type: retention
  pass_rule: '>= 0.85 delayed recheck accuracy after ~14 days'
failure_modes:
- C1-FM-01
- C1-FM-02
- C1-FM-03
- C1-FM-04
