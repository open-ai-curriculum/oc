name: Quality Gates

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - develop
      - 'codex/**'

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python validation dependency
        run: python3 -m pip install pyyaml

      - name: Run repository quality gates
        run: node scripts/validate-docs.js
